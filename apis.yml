aid: leanix
name: LeanIX
description: >-
  LeanIX (now SAP LeanIX) is an enterprise architecture and SaaS management platform providing IT portfolio management,
  application portfolio rationalization, SaaS discovery, and technology risk management. The platform exposes REST APIs
  for integrating with the fact sheet inventory, running inbound and outbound synchronizations, and managing workspace
  data.
type: Index
