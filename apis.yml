apis:
  - aid: leanix:integration-api
    name: LeanIX Integration API
    description: >-
      The LeanIX Integration API exposes a generic interface for inbound and outbound data synchronization with the
      LeanIX workspace. It supports processor configurations, starter and advanced examples, and managing
      synchronization runs that move fact sheet data in and out of LeanIX.
    humanURL: https://help.sap.com/docs/leanix/ea
